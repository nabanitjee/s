<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sreya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="intro-screen" class="screen active">
            <div class="stars"></div>
            <h1 class="flicker" onclick="startExperience()">CLICK TO START THE MAGIC!</h1>
        </div>

        <div id="chat-screen" class="screen">
            <div class="chat-header">For Sreya's 19th!</div>
            <div id="chat-stream">
                <div class="bubble">A LITTLE TEASE ;)<br>Okay, Sreya, you might be 19, but I'm pretty sure you still need adult supervision.</div>
                <div class="bubble">DON'T PANIC! 🚀<br>Yes, I'm going ghost mode for JEE! But no way I'd miss your big day.</div>
                <div class="bubble">HAPPY 19th BIRTHDAY, SREYA! 🎂<br>May this year be amazing!</div>
            </div>
            <button id="final-btn" onclick="celebrate()">Final Message!</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
